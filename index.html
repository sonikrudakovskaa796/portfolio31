<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Соня — Дизайнер</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="Chair406.otf" as="font" type="font/otf" crossorigin>

    <style>
        /* ШРИФТ CHAIR 406 */
        @font-face {
            font-family: 'Chair406';
            src: url('Chair406.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Chair406', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #ffe6f0;
        }

        .page-wrapper {
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #4a2b3c;
            position: relative;
        }

        .section-1 {
            background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
        }

        .section-2 {
            background: linear-gradient(135deg, #ffdbe8, #ffeaf5);
            justify-content: flex-start;
        }

        .section-3 {
            background: linear-gradient(135deg, #ffeef7, #ffd9f0);
        }

        /* Пончик в центре — под плашкой */
        .ponchik {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(350px, 55vw, 650px);
            height: clamp(350px, 55vw, 650px);
            object-fit: cover;
            border-radius: 50%;
            z-index: 1;
            filter: drop-shadow(0 30px 60px rgba(255, 182, 224, 0.6));
            transition: rotate 0.3s ease-out;
        }

        /* Плашка НАД пончиком — с центрированием */
        .glass {
            height: 100vh;
            width: 50vw;
            padding: 60px 50px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            box-shadow: none;
            color: #4a2b3c;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            font-family: 'Chair406', sans-serif;
            font-size: clamp(16px, 2vw, 18px);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .glass-title {
            font-family: 'Chair406', sans-serif;
            font-size: clamp(36px, 7vw, 56px);
            font-weight: 600;
            color: #3a1f2b;
            margin-bottom: 0;
        }
