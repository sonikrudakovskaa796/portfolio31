<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый сайт</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #ffe6f0;
        }

        .page-wrapper {
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #4a2b3c;
            position: relative;
        }

        .section-1 {
            background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
        }

        .section-2 {
            background: linear-gradient(135deg, #ffdbe8, #ffeaf5);
        }

        .section-3 {
            background: linear-gradient(135deg, #ffeef7, #ffd9f0);
        }

        .content {
            max-width: 800px;
            text-align: center;
        }

        .title {
            font-size: clamp(32px, 5vw, 48px);
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: clamp(16px, 2.4vw, 20px);
            line-height: 1.5;
            opacity: 0.9;
        }

        .scroll-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Стили для пончика */
        .ponchik {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(200px, 35vw, 400px);
            height: clamp(200px, 35vw, 400px);
            object-fit: cover;
            border-radius: 50%;
            z-index: 1;
            filter: drop-shadow(0 20px 40px rgba(255, 182, 224, 0.5));
            transition: rotate 0.3s ease-out;
        }

        /* Текст поверх пончика */
        .content {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- Экран 1 -->
        <section class="section section-1">
            <!-- Пончик в центре, крутится за мышкой -->
            <img src="пончик 2.png" alt="Пончик" class="ponchik" id="ponchik">
            
            <div class="content">
                <h1 class="title">Привет! Это первый экран</h1>
                <p class="subtitle">
                    Здесь информация о себе. Пончик крутится в след за мышкой, но всегда в центре!
                </p>
            </div>
          
        </section>

        <!-- Экран 2 -->
        <section class="section section-2">
            <div class="content">
                <h2 class="title">Второй экран</h2>
                <p class="subtitle">
                    Тут можно разместить постеры, работы, фотографии или описание услуг.
                </p>
            </div>
        </section>

        <!-- Экран 3 -->
        <section class="section section-3">
            <div class="content">
                <h2 class="title">Третий экран</h2>
                <p class="subtitle">
                    Например, контакты или форму обратной связи.
                </p>
            </div>
        </section>
    </div>

    <script>
        // Скролл по колёсику (без изменений)
        (function () {
            const wrapper = document.querySelector('.page-wrapper');
            const sections = Array.from(document.querySelectorAll('.section'));
            let isScrolling = false;

            wrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (isScrolling) return;

                const direction = e.deltaY > 0 ? 1 : -1;
                const currentScroll = wrapper.scrollTop;
                const viewportHeight = window.innerHeight;

                const currentIndex = Math.round(currentScroll / viewportHeight);
                let targetIndex = currentIndex + direction;

                if (targetIndex < 0) targetIndex = 0;
                if (targetIndex > sections.length - 1) targetIndex = sections.length - 1;

                const targetOffset = targetIndex * viewportHeight;

                isScrolling = true;
                wrapper.scrollTo({
                    top: targetOffset,
                    behavior: 'smooth'
                });

                setTimeout(() => {
                    isScrolling = false;
                }, 700);
            }, { passive: false });
        })();

        // Крутение пончика за мышкой (только на первой секции)
        const ponchik = document.getElementById('ponchik');
        const section1 = document.querySelector('.section-1');
        let currentRotation = 0;

        section1.addEventListener('mousemove', (e) => {
            // Получаем позицию мыши относительно центра секции
            const rect = section1.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const mouseX = e.clientX - centerX;
            const mouseY = e.clientY - centerY;
            
            // Вычисляем угол от центра к мышке
            const angle = Math.atan2(mouseY, mouseX);
            const targetRotation = angle * 180 / Math.PI;
            
            // Плавно поворачиваем (разница не больше 180°)
            let diff = targetRotation - currentRotation;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            currentRotation += diff * 0.15; // Плавность
            ponchik.style.transform = `translate(-50%, -50%) rotate(${currentRotation}deg)`;
        });
    </script>
</body>
</html>
